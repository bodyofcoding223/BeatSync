<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BeatSync Pro – Group Play</title>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
    body {
      background: #0a0a14;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: rgba(18, 18, 32, 0.9);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2.5rem;
      padding: 1.5rem 1.2rem;
      width: 100%;
      max-width: 450px;
      color: #f0f0f0;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7);
      max-height: 90vh;
      overflow-y: auto;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .section { display: none; flex-direction: column; gap: 0.8rem; }
    .section.active { display: flex; }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 1.2rem;
      border: none;
      font-weight: 600;
      background: #4f46e5;
      color: white;
      box-shadow: 0 8px 20px rgba(79,70,229,0.5);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
    }
    .btn:active { transform: scale(0.96); }
    .btn.secondary { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2); box-shadow: none; }
    .btn.small { width: auto; padding: 8px 16px; font-size: 0.85rem; }
    .input-field {
      width: 100%;
      padding: 12px;
      border-radius: 1.2rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      outline: none;
      font-size: 0.9rem;
    }
    .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .small-text { font-size: 0.8rem; color: #aaa; }
    .seek-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 6px;
      background: #4f46e5;
      outline: none;
    }
    .seek-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 14px #818cf8;
    }
    video { width: 100%; border-radius: 1rem; background: black; max-height: 180px; }
    .badge { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 2rem; font-size: 0.75rem; }
    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      width: auto;
      align-self: flex-start;
    }
    .error-text { color: #f87171; }
    .success-text { color: #4ade80; }
    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #374151;
      transition: .4s;
      border-radius: 34px;
      pointer-events: auto;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px; width: 20px;
      left: 2px; bottom: 2px;
      background: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background: #4f46e5; }
    input:checked + .slider:before { transform: translateX(22px); }
    .playlist-item {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      border-radius: 0.8rem;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .info-text { font-size: 0.7rem; color: #9ca3af; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎧 BeatSync Pro</h1>

  <!-- HOME -->
  <div id="homeScreen" class="section active">
    <div class="flex-row" style="justify-content:space-between; align-items:center;">
      <input type="text" id="nicknameInput" class="input-field" placeholder="Your name" style="flex:1;">
      <div class="toggle-wrapper">
        <span class="info-text">LAN</span>
        <label class="toggle-switch" for="localModeToggle">
          <input type="checkbox" id="localModeToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <p class="info-text" style="margin-top:-0.5rem;">LAN mode reduces latency but still needs internet for initial handshake.</p>
    <button class="btn" id="createRoomBtn">✨ Create Room (Host)</button>
    <div style="text-align:center;color:#9ca3af;">— or —</div>
    <input type="text" id="joinRoomId" class="input-field" placeholder="Paste Host ID">
    <button class="btn secondary" id="joinRoomBtn">🔗 Join as Listener</button>
    <p id="globalStatus" class="small-text" style="text-align:center;"></p>
  </div>

  <!-- HOST -->
  <div id="hostScreen" class="section">
    <button class="btn small secondary back-btn" id="hostBackBtn">◀ Leave Room</button>
    <div class="flex-row" style="justify-content:space-between;">
      <span class="badge">🎤 Host</span>
      <span class="badge" id="listenerCount">0 listeners</span>
    </div>
    <div class="flex-row">
      <input type="text" id="hostIdDisplay" class="input-field" readonly style="flex:1;">
      <button class="btn small secondary" id="copyIdBtn">📋</button>
    </div>
    <p id="localIPDisplay" class="info-text"></p>
    <div class="flex-row">
      <button class="btn secondary" id="uploadBtn" style="flex:1;">📁 Upload</button>
      <input type="file" id="fileInput" accept="audio/*,video/*" hidden>
      <button class="btn secondary" id="urlBtn" style="flex:1;">🌐 URL</button>
    </div>
    <input type="text" id="urlInput" class="input-field" placeholder="Audio/Video URL" style="display:none;">
    <button class="btn secondary" id="addToPlaylistBtn" style="display:none;">➕ Add to Queue</button>
    <div id="playlistContainer" style="max-height:100px;overflow-y:auto;"></div>
    <p id="hostStatus" class="small-text"></p>
    <video id="hostVideo" controls style="display:none;" playsinline></video>
    <div>
      <div class="flex-row" style="justify-content:space-between;">
        <span id="hostCurrent">0:00</span>
        <span id="hostDuration">0:00</span>
      </div>
      <input type="range" id="hostSeek" class="seek-slider" min="0" max="100" step="0.1" disabled>
      <div class="flex-row" style="justify-content:space-between; margin:5px 0;">
        <span class="small-text">🔊 Vol</span>
        <input type="range" id="hostVolume" class="seek-slider" min="0" max="1" step="0.01" value="1" style="width:80%;">
      </div>
      <div class="flex-row" style="justify-content:center; gap:20px;">
        <button class="btn" style="width:55px;height:55px;border-radius:50%;" id="hostPlay" disabled>▶️</button>
        <button class="btn secondary" style="width:55px;height:55px;border-radius:50%;" id="hostPause" disabled>⏸️</button>
        <button class="btn secondary small" id="hostNextBtn" disabled>⏭️</button>
      </div>
    </div>
  </div>

  <!-- LISTENER -->
  <div id="listenerScreen" class="section">
    <button class="btn small secondary back-btn" id="listenerBackBtn">◀ Leave Room</button>
    <span class="badge">🎧 Listener</span>
    <p id="listenerNowPlaying" class="small-text">Waiting for host...</p>
    <video id="listenerVideo" controls style="display:none;" playsinline></video>
    <div class="flex-row" style="justify-content:space-between;">
      <span id="listenerCurrent">0:00</span>
      <span id="listenerDuration">0:00</span>
    </div>
    <input type="range" id="listenerSeek" class="seek-slider" min="0" max="100" step="0.1" disabled>
    <canvas id="visualizer" width="300" height="50" style="width:100%; border-radius:8px; background:#111; display:none;"></canvas>
    <p id="listenerStatus" class="small-text" style="text-align:center;"></p>
  </div>
</div>

<script>
  (() => {
    // ========== DOM ==========
    const $ = (id) => document.getElementById(id);
    const home = $('homeScreen'), hostScreen = $('hostScreen'), listenerScreen = $('listenerScreen');
    const globalStatus = $('globalStatus');
    const nicknameInput = $('nicknameInput'), localModeToggle = $('localModeToggle');
    const createRoomBtn = $('createRoomBtn'), joinRoomBtn = $('joinRoomBtn'), joinRoomId = $('joinRoomId');
    const hostIdDisplay = $('hostIdDisplay'), copyIdBtn = $('copyIdBtn');
    const localIPDisplay = $('localIPDisplay');
    const uploadBtn = $('uploadBtn'), fileInput = $('fileInput'), urlBtn = $('urlBtn');
    const urlInput = $('urlInput'), addToPlaylistBtn = $('addToPlaylistBtn'), playlistContainer = $('playlistContainer');
    const hostStatus = $('hostStatus'), hostVideo = $('hostVideo');
    const hostPlay = $('hostPlay'), hostPause = $('hostPause'), hostSeek = $('hostSeek'), hostVolume = $('hostVolume'), hostNextBtn = $('hostNextBtn');
    const hostCurrent = $('hostCurrent'), hostDuration = $('hostDuration'), listenerCount = $('listenerCount');
    const listenerNowPlaying = $('listenerNowPlaying'), listenerVideo = $('listenerVideo');
    const listenerCurrent = $('listenerCurrent'), listenerDuration = $('listenerDuration'), listenerSeek = $('listenerSeek');
    const listenerStatus = $('listenerStatus'), visualizerCanvas = $('visualizer');
    const hostBackBtn = $('hostBackBtn'), listenerBackBtn = $('listenerBackBtn');

    // ========== State ==========
    let peer, connections = [], hostConn = null, isHost = false, myId;
    let mediaType = null, mediaUrl = null;
    let audioCtx, audioBuffer, sourceNode, gainNode, analyserNode, startTime = 0, pauseOffset = 0, isPlaying = false, duration = 0, animFrame;
    let pendingFileChunks = null;
    let pendingPlayData = null;
    let playlist = [];
    let currentPlaylistIndex = -1;
    let nickname = '';
    let visualizerInterval = null;
    let wakeLock = null;

    // ========== Helpers ==========
    function switchTo(screen) {
      [home, hostScreen, listenerScreen].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function formatTime(s) {
      if (isNaN(s) || s < 0) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function stopAudio() {
      if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode.disconnect(); sourceNode = null; }
      if (audioCtx && audioCtx.state !== 'closed') audioCtx.suspend();
      if (visualizerInterval) { clearInterval(visualizerInterval); visualizerInterval = null; }
      visualizerCanvas.style.display = 'none';
    }

    function resetMedia(clearPending = true) {
      stopAudio();
      cancelAnimationFrame(animFrame);
      isPlaying = false; pauseOffset = 0; duration = 0; audioBuffer = null; mediaType = null; mediaUrl = null;
      pendingFileChunks = null;
      if (clearPending) pendingPlayData = null;
      if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; }
      gainNode = null; analyserNode = null;
      hostVideo.style.display = 'none'; listenerVideo.style.display = 'none';
      hostVideo.src = ''; listenerVideo.src = '';
      if (isHost) {
        hostPlay.disabled = true; hostPause.disabled = true; hostSeek.disabled = true; hostNextBtn.disabled = true;
        hostSeek.value = 0; hostCurrent.textContent = '0:00'; hostDuration.textContent = '0:00';
      }
    }

    function broadcast(msg) { connections.forEach(c => { if (c.open) c.send(msg); }); }

    // ========== Safe Base64 encode/decode ==========
    function uint8ToBase64(bytes) {
      let binary = '';
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToUint8(base64) {
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    // ========== File Transfer (Base64 chunks) ==========
    function sendFileToPeer(conn, chunksData) {
      conn.send({ type: 'file-meta', name: chunksData.name, mime: chunksData.mime, totalChunks: chunksData.totalChunks });
      chunksData.chunks.forEach((chunk, i) => conn.send({ type: 'file-chunk', name: chunksData.name, index: i, data: chunk }));
    }

    function prepareFileChunks(name, mime, arrayBuffer) {
      const CHUNK_SIZE = 8 * 1024; // 8 KB safe for base64
      const uint8 = new Uint8Array(arrayBuffer);
      const chunks = [];
      for (let i = 0; i < uint8.length; i += CHUNK_SIZE) {
        const slice = uint8.slice(i, i + CHUNK_SIZE);
        chunks.push(uint8ToBase64(slice));
      }
      return { name, mime, totalChunks: chunks.length, chunks };
    }

    const incomingFiles = {};
    function handleHostIncoming(data, conn) {
      if (data.type === 'file-meta') {
        incomingFiles[data.name] = { chunks: new Array(data.totalChunks), mime: data.mime, total: data.totalChunks, received: 0 };
      } else if (data.type === 'file-chunk') {
        const file = incomingFiles[data.name];
        if (!file) return;
        file.chunks[data.index] = data.data;
        file.received++;
        if (file.received === file.total) {
          const byteArrays = file.chunks.map(b64 => base64ToUint8(b64));
          const blob = new Blob(byteArrays, { type: file.mime });
          const url = URL.createObjectURL(blob);
          delete incomingFiles[data.name];
          loadMediaFromUrl(url, file.mime.startsWith('video/') ? 'video' : 'audio');
        }
      } else if (data.type === 'media-url') {
        loadMediaFromUrl(data.url, data.mediaType);
      } else if (data.type === 'play') handleRemotePlay(data);
      else if (data.type === 'pause') handleRemotePause(data);
      else if (data.type === 'seek') handleRemoteSeek(data);
      else if (data.type === 'volume') { if (gainNode) gainNode.gain.value = data.volume; }
      else if (data.type === 'playlist-item') { playlist.push({ url: data.url, type: data.type }); }
    }

    function onHostMessage(data) { handleHostIncoming(data, hostConn); }

    // ========== PeerJS (reads LAN toggle at init) ==========
    function initPeer(id) {
      if (peer) { peer.destroy(); peer = null; }
      return new Promise((resolve, reject) => {
        const iceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
        if (!localModeToggle.checked) {
          iceServers.push({ urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' });
          iceServers.push({ urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' });
        }
        peer = new Peer(id, { debug: 0, config: { iceServers } });
        peer.on('open', pid => { myId = pid; resolve(pid); });
        peer.on('error', err => { globalStatus.textContent = '⚠️ ' + err.type; reject(err); });
        peer.on('disconnected', () => peer.reconnect());
        peer.on('connection', conn => {
          if (!isHost) return;
          connections.push(conn);
          listenerCount.textContent = connections.length + ' listener(s)';
          conn.on('data', data => handleHostIncoming(data, conn));
          conn.on('close', () => {
            connections = connections.filter(c => c !== conn);
            listenerCount.textContent = connections.length + ' listener(s)';
          });
          // Send current state
          if (pendingFileChunks) sendFileToPeer(conn, pendingFileChunks);
          else if (mediaUrl && mediaType) conn.send({ type: 'media-url', mediaType, url: mediaUrl });
          if (isPlaying) {
            const offset = mediaType === 'video' ? hostVideo.currentTime : (audioCtx ? audioCtx.currentTime - startTime : 0);
            conn.send({ type: 'play', startTime: offset, serverTime: Date.now() + 150 });
          } else if (pauseOffset > 0) conn.send({ type: 'pause', pauseTime: pauseOffset });
          if (gainNode) conn.send({ type: 'volume', volume: gainNode.gain.value });
          playlist.forEach(item => conn.send({ type: 'playlist-item', url: item.url, type: item.type }));
        });
      });
    }

    // ========== Local IP Detection ==========
    function getLocalIPs() {
      return new Promise((resolve) => {
        const ips = new Set();
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = (e) => {
          if (!e.candidate) {
            pc.close();
            resolve(Array.from(ips));
            return;
          }
          const candidate = e.candidate.candidate;
          const matches = candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
          if (matches) ips.add(matches[0]);
        };
        setTimeout(() => resolve(Array.from(ips)), 2000);
      });
    }

    // ========== Media Loading ==========
    async function loadMediaFromUrl(url, type) {
      const savedPending = pendingPlayData;
      resetMedia(false);
      mediaType = type;
      mediaUrl = url;
      if (!isHost) listenerNowPlaying.textContent = `Loading ${type}...`;
      else listenerNowPlaying.textContent = '';

      if (type === 'video') {
        if (isHost) {
          hostVideo.src = url; hostVideo.style.display = 'block'; hostVideo.load();
          hostVideo.onloadedmetadata = () => {
            duration = hostVideo.duration;
            hostDuration.textContent = formatTime(duration);
            hostSeek.max = duration;
            hostPlay.disabled = false; hostPause.disabled = false; hostSeek.disabled = false; hostNextBtn.disabled = false;
          };
        } else {
          listenerVideo.src = url; listenerVideo.style.display = 'block'; listenerVideo.load();
          listenerVideo.onloadedmetadata = () => {
            listenerDuration.textContent = formatTime(listenerVideo.duration);
            listenerSeek.max = listenerVideo.duration;
            pendingPlayData = savedPending;
            if (pendingPlayData) { handleRemotePlay(pendingPlayData); pendingPlayData = null; }
          };
        }
      } else {
        if (isHost) hostVideo.style.display = 'none';
        else listenerVideo.style.display = 'none';
        if (audioCtx) await audioCtx.close();
        audioCtx = new AudioContext();
        gainNode = audioCtx.createGain();
        analyserNode = audioCtx.createAnalyser();
        analyserNode.fftSize = 256;
        gainNode.connect(analyserNode);
        analyserNode.connect(audioCtx.destination);
        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const buf = await resp.arrayBuffer();
          audioBuffer = await audioCtx.decodeAudioData(buf);
          duration = audioBuffer.duration;
          if (isHost) {
            hostDuration.textContent = formatTime(duration);
            hostSeek.max = duration;
            hostPlay.disabled = false; hostPause.disabled = false; hostSeek.disabled = false; hostNextBtn.disabled = false;
          } else {
            listenerDuration.textContent = formatTime(duration);
            listenerSeek.max = duration;
            listenerNowPlaying.textContent = 'Audio ready';
            pendingPlayData = savedPending;
            if (pendingPlayData) { handleRemotePlay(pendingPlayData); pendingPlayData = null; }
          }
        } catch (e) {
          console.error(e);
          if (isHost) hostStatus.textContent = '❌ Failed to load.';
          else listenerNowPlaying.textContent = '❌ Audio load failed.';
        }
      }
    }

    // ========== Host Playback ==========
    async function hostPlayAction() {
      if (!mediaType) return;
      if (mediaType !== 'video' && audioCtx.state === 'suspended') await audioCtx.resume();
      if (mediaType === 'video') {
        hostVideo.currentTime = pauseOffset;
        await hostVideo.play().catch(() => hostStatus.textContent = '⚠️ Play blocked');
        isPlaying = true;
        broadcast({ type: 'play', startTime: pauseOffset, serverTime: Date.now() + 150 });
        updateVideoTimeHost();
        requestWakeLock();
      } else {
        if (!audioBuffer || isPlaying) return;
        isPlaying = true;
        stopAudio();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0, pauseOffset);
        startTime = audioCtx.currentTime - pauseOffset;
        updateAudioTime(hostCurrent, hostSeek, audioCtx, startTime);
        broadcast({ type: 'play', startTime: pauseOffset, serverTime: Date.now() + 150 });
        requestWakeLock();
      }
    }

    function hostPauseAction() {
      if (!isPlaying) return;
      if (mediaType === 'video') {
        hostVideo.pause(); pauseOffset = hostVideo.currentTime; isPlaying = false;
        broadcast({ type: 'pause', pauseTime: pauseOffset });
      } else {
        stopAudio(); pauseOffset = audioCtx.currentTime - startTime; isPlaying = false;
        cancelAnimationFrame(animFrame);
        broadcast({ type: 'pause', pauseTime: pauseOffset });
      }
    }

    function hostSeekAction(val) {
      pauseOffset = val;
      if (mediaType === 'video') {
        hostVideo.currentTime = val;
        if (isPlaying) hostVideo.play().catch(()=>{});
      } else if (isPlaying) {
        stopAudio();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0, val);
        startTime = audioCtx.currentTime - val;
      }
      broadcast({ type: 'seek', seekTime: val });
    }

    hostVolume.addEventListener('input', () => {
      const vol = parseFloat(hostVolume.value);
      if (gainNode) gainNode.gain.value = vol;
      broadcast({ type: 'volume', volume: vol });
    });

    function updateAudioTime(currentEl, seekEl, ctx, start) {
      if (!isPlaying) return;
      const elapsed = ctx.currentTime - start;
      seekEl.value = elapsed;
      currentEl.textContent = formatTime(elapsed);
      animFrame = requestAnimationFrame(() => updateAudioTime(currentEl, seekEl, ctx, start));
    }
    function updateVideoTimeHost() {
      if (!isPlaying || mediaType !== 'video') return;
      hostSeek.value = hostVideo.currentTime;
      hostCurrent.textContent = formatTime(hostVideo.currentTime);
      requestAnimationFrame(updateVideoTimeHost);
    }

    // ========== Remote Control ==========
    function handleRemotePlay(data) {
      if (!mediaType || (mediaType === 'audio' && !audioBuffer) || (mediaType === 'video' && !listenerVideo.duration)) {
        pendingPlayData = data; return;
      }
      const { startTime: offset, serverTime } = data;
      const delay = Math.max(0, serverTime - Date.now());
      if (mediaType === 'video') {
        setTimeout(() => {
          if (listenerVideo.src) {
            listenerVideo.currentTime = offset;
            listenerVideo.play().catch(()=>{});
            isPlaying = true;
            updateVideoTimeListener();
          }
        }, delay);
      } else {
        stopAudio();
        audioCtx.resume().then(() => {
          const target = audioCtx.currentTime + delay / 1000;
          sourceNode = audioCtx.createBufferSource();
          sourceNode.buffer = audioBuffer;
          sourceNode.connect(gainNode);
          sourceNode.start(target, offset);
          startTime = target - offset;
          isPlaying = true;
          updateAudioTime(listenerCurrent, listenerSeek, audioCtx, startTime);
          if (!isHost) startVisualizer(analyserNode);
        });
      }
    }
    function handleRemotePause(data) {
      if (!mediaType) return;
      if (mediaType === 'video') { listenerVideo.pause(); listenerVideo.currentTime = data.pauseTime; isPlaying = false; }
      else { stopAudio(); pauseOffset = data.pauseTime; isPlaying = false; cancelAnimationFrame(animFrame); }
    }
    function handleRemoteSeek(data) {
      if (!mediaType) return;
      pauseOffset = data.seekTime;
      if (mediaType === 'video') { listenerVideo.currentTime = data.seekTime; if (isPlaying) listenerVideo.play().catch(()=>{}); }
      else if (isPlaying && audioBuffer) {
        stopAudio();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.connect(gainNode);
        sourceNode.start(0, data.seekTime);
        startTime = audioCtx.currentTime - data.seekTime;
      }
    }
    function updateVideoTimeListener() {
      if (!isPlaying || mediaType !== 'video') return;
      listenerSeek.value = listenerVideo.currentTime;
      listenerCurrent.textContent = formatTime(listenerVideo.currentTime);
      requestAnimationFrame(updateVideoTimeListener);
    }

    // ========== Visualizer ==========
    function startVisualizer(node) {
      if (!node) return;
      visualizerCanvas.style.display = 'block';
      if (visualizerInterval) clearInterval(visualizerInterval);
      const canvasCtx = visualizerCanvas.getContext('2d');
      const bufferLength = node.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      visualizerInterval = setInterval(() => {
        node.getByteFrequencyData(dataArray);
        canvasCtx.fillStyle = '#0a0a14';
        canvasCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        const barWidth = (visualizerCanvas.width / bufferLength) * 2.5;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
          const barHeight = dataArray[i] / 2;
          canvasCtx.fillStyle = '#4f46e5';
          canvasCtx.fillRect(x, visualizerCanvas.height - barHeight, barWidth, barHeight);
          x += barWidth + 1;
        }
      }, 100);
    }

    // ========== Playlist ==========
    function addToPlaylist(url, type) {
      playlist.push({ url, type });
      renderPlaylist();
      if (!url.startsWith('blob:')) broadcast({ type: 'playlist-item', url, type });
    }
    function renderPlaylist() {
      playlistContainer.innerHTML = playlist.map((item, i) =>
        `<div class="playlist-item">${i+1}. ${item.url.slice(0,30)}... <button data-index="${i}" class="remove-playlist">✕</button></div>`
      ).join('');
      document.querySelectorAll('.remove-playlist').forEach(btn => {
        btn.onclick = (e) => {
          const idx = parseInt(e.target.dataset.index);
          playlist.splice(idx, 1);
          renderPlaylist();
        };
      });
    }
    function playNextFromQueue() {
      if (playlist.length === 0) return;
      currentPlaylistIndex = (currentPlaylistIndex + 1) % playlist.length;
      const next = playlist[currentPlaylistIndex];
      loadMediaFromUrl(next.url, next.type).then(() => {
        if (isHost) {
          mediaUrl = next.url; mediaType = next.type;
          if (!next.url.startsWith('blob:')) broadcast({ type: 'media-url', mediaType: next.type, url: next.url });
        }
      });
    }

    hostNextBtn.onclick = () => playNextFromQueue();

    // ========== Wake Lock ==========
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
      }
    }
    function releaseWakeLock() {
      if (wakeLock) wakeLock.release().catch(() => {});
    }

    // ========== Nickname ==========
    nickname = nicknameInput.value || 'User';
    nicknameInput.addEventListener('input', () => { nickname = nicknameInput.value || 'User'; });

    // ========== Leave Room ==========
    function leaveRoom() {
      resetMedia(true);
      releaseWakeLock();
      if (peer) { peer.destroy(); peer = null; }
      connections = []; hostConn = null; isHost = false; myId = null;
      urlInput.style.display = 'none'; addToPlaylistBtn.style.display = 'none';
      playlistContainer.innerHTML = '';
      localIPDisplay.textContent = '';
      switchTo(home); globalStatus.textContent = '';
    }

    // ========== Event Listeners ==========
    createRoomBtn.onclick = async () => {
      globalStatus.textContent = 'Starting host...';
      try {
        await initPeer();
        isHost = true;
        hostIdDisplay.value = myId;
        switchTo(hostScreen);
        globalStatus.textContent = '';
        getLocalIPs().then(ips => {
          if (ips.length) localIPDisplay.textContent = '📡 Local IP(s): ' + ips.join(', ');
        });
      } catch { globalStatus.innerHTML = '<span class="error-text">Failed.</span>'; }
    };
    joinRoomBtn.onclick = async () => {
      const id = joinRoomId.value.trim();
      if (!id) return;
      globalStatus.textContent = 'Connecting...';
      try {
        await initPeer();
        isHost = false;
        const conn = peer.connect(id, { reliable: true });
        hostConn = conn;
        let connected = false;
        conn.on('open', () => {
          connected = true;
          switchTo(listenerScreen);
          listenerStatus.textContent = 'Connected ✅'; listenerStatus.className = 'success-text';
          conn.on('data', onHostMessage);
        });
        conn.on('close', () => { listenerStatus.textContent = 'Host disconnected.'; setTimeout(leaveRoom, 2000); });
        conn.on('error', () => listenerStatus.textContent = 'Error');
        setTimeout(() => {
          if (!connected) {
            globalStatus.innerHTML = '<span class="error-text">Timeout</span>';
            if (hostConn) hostConn.close();
            if (peer) peer.destroy();
            peer = null;
          }
        }, 10000);
      } catch { globalStatus.innerHTML = '<span class="error-text">Failed.</span>'; }
    };

    copyIdBtn.onclick = () => navigator.clipboard.writeText(hostIdDisplay.value).then(() => hostStatus.textContent = 'Copied!');

    uploadBtn.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      hostStatus.textContent = 'Processing...';
      const reader = new FileReader();
      reader.onload = async () => {
        const arrayBuffer = reader.result;
        const blobUrl = URL.createObjectURL(file);
        const chunksData = prepareFileChunks(file.name, file.type, arrayBuffer);
        pendingFileChunks = chunksData;
        await loadMediaFromUrl(blobUrl, file.type.startsWith('video/') ? 'video' : 'audio');
        connections.forEach(conn => sendFileToPeer(conn, chunksData));
        hostStatus.textContent = '✅ Shared!';
      };
      reader.readAsArrayBuffer(file);
    };

    urlBtn.onclick = () => { urlInput.style.display = 'block'; addToPlaylistBtn.style.display = 'block'; };
    addToPlaylistBtn.onclick = () => {
      const url = urlInput.value.trim();
      if (!url) return;
      const type = (url.includes('video') || url.endsWith('.mp4')) ? 'video' : 'audio';
      addToPlaylist(url, type);
      urlInput.value = '';
      hostStatus.textContent = 'Added to queue.';
    };

    hostPlay.onclick = hostPlayAction;
    hostPause.onclick = hostPauseAction;
    hostSeek.oninput = () => hostSeekAction(parseFloat(hostSeek.value));

    hostVideo.ontimeupdate = () => {
      if (isPlaying && mediaType === 'video') { hostSeek.value = hostVideo.currentTime; hostCurrent.textContent = formatTime(hostVideo.currentTime); }
    };
    listenerVideo.ontimeupdate = () => {
      if (isPlaying && mediaType === 'video' && !isHost) { listenerSeek.value = listenerVideo.currentTime; listenerCurrent.textContent = formatTime(listenerVideo.currentTime); }
    };

    hostBackBtn.onclick = leaveRoom;
    listenerBackBtn.onclick = leaveRoom;

    window.onbeforeunload = () => { resetMedia(true); releaseWakeLock(); if (peer) peer.destroy(); };
  })();
</script>
</body>
</html>
